services:
  - type: web
    name: nsd-backend
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MAX_DOCUMENT_BYTES
        value: 26214400
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: SAT_API_URL
        sync: false
      - key: SAT_API_KEY
        sync: false
      - key: BURO_API_URL
        sync: false
      - key: BURO_API_KEY
        sync: false
      - key: INEGI_API_TOKEN
        sync: false
      - key: BANXICO_API_TOKEN
        sync: false
      - key: CNBV_PADRON_API_URL
        sync: false
      - key: CNBV_PADRON_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
